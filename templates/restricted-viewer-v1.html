<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="mdworks-viewer-format" content="mdworks-restricted-viewer">
  <meta name="mdworks-viewer-format-version" content="1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data: blob:; font-src data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none';">
  <title>__TITLE__</title>
  <style>
    :root{color-scheme:light;--toolbar-h:56px;--outline-w:260px;--border:#d8dee4;--muted:#57606a;--bg:#f6f8fa;--panel:#fff;--text:#1f2328;--accent:#0969da}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;overflow-x:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.viewer-shell,.viewer-shell *{user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;-webkit-touch-callout:none}.viewer-toolbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:.75rem;min-height:var(--toolbar-h);padding:.6rem 1rem;background:rgba(255,255,255,.96);border-bottom:1px solid var(--border);backdrop-filter:blur(8px)}.viewer-title{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.viewer-button{min-width:44px;min-height:40px;border:1px solid var(--border);border-radius:.5rem;background:#fff;color:var(--text);font:inherit;cursor:pointer}.viewer-button:focus-visible,.outline-item:focus-visible{outline:3px solid #54aeff;outline-offset:2px}.viewer-app{display:grid;grid-template-columns:var(--outline-w) minmax(0,1fr);min-height:calc(100vh - var(--toolbar-h))}.viewer-app.outline-collapsed{grid-template-columns:0 minmax(0,1fr)}.outline-panel{overflow:auto;border-right:1px solid var(--border);background:#fff;transition:transform .18s ease,opacity .18s ease}.viewer-app.outline-collapsed .outline-panel{opacity:0;pointer-events:none}.outline-inner{padding:1rem}.outline-heading{margin:0 0 .75rem;font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}#viewer-outline{display:flex;flex-direction:column;gap:.2rem}.outline-item{display:block;width:100%;min-height:40px;padding:.45rem .5rem;border:0;border-radius:.4rem;background:transparent;color:#24292f;font:inherit;text-align:left;cursor:pointer}.outline-item:hover,.outline-item.is-active{background:#eef6ff;color:#0550ae}.outline-level-1{padding-left:.35rem;font-weight:700}.outline-level-2{padding-left:1rem}.outline-level-3{padding-left:1.8rem;font-size:.95rem}.viewer-document{min-width:0;padding:1.5rem clamp(.75rem,3vw,2rem);overflow:auto}.viewer-status{max-width:760px;margin:1rem auto;padding:1rem 1.2rem;background:#fff;border:1px solid var(--border);border-radius:.75rem}.viewer-error{color:#8a1f11}.viewer-section{max-width:1120px;margin:0 auto 2rem;padding:1rem;background:#fff;border:1px solid var(--border);border-radius:.75rem;box-shadow:0 1px 2px rgba(27,31,36,.04)}.viewer-section h1,.viewer-section h2,.viewer-section h3{scroll-margin-top:calc(var(--toolbar-h) + 1rem)}.viewer-image{margin:1rem 0 0;text-align:center}.viewer-image img{display:block;max-width:100%;height:auto;margin-inline:auto;-webkit-user-drag:none;user-select:none}
    @media (max-width:800px){.viewer-toolbar{padding:.55rem .75rem}.viewer-app,.viewer-app.outline-collapsed{display:block}.outline-panel{position:fixed;z-index:30;top:var(--toolbar-h);left:0;width:min(82vw,320px);max-width:100vw;height:calc(100vh - var(--toolbar-h));border-right:1px solid var(--border);box-shadow:0 20px 40px rgba(0,0,0,.18);transform:translateX(0)}.viewer-app.outline-collapsed .outline-panel{transform:translateX(-105%);opacity:1}.viewer-document{padding:1rem .75rem}.viewer-section{padding:.8rem;margin-bottom:1rem}.outline-item{min-height:44px}}
    @media print{body *{display:none!important}body::before{content:"Printing is disabled for this Restricted Viewer.";display:block!important;padding:2rem;font-family:sans-serif;color:#111}}
  </style>
</head>
<body>
  <div class="viewer-shell" id="viewer-shell">
    <div class="viewer-toolbar">
      <button id="outline-toggle" class="viewer-button" type="button" aria-controls="outline-panel" aria-expanded="true">Outline</button>
      <div class="viewer-title" id="viewer-title">Restricted Viewer</div>
    </div>
    <div class="viewer-app" id="viewer-app">
      <aside id="outline-panel" class="outline-panel" hidden><div class="outline-inner"><h2 class="outline-heading">Outline</h2><nav id="viewer-outline" aria-label="Document outline"></nav></div></aside>
      <main id="viewer-document" class="viewer-document" aria-live="polite"><div id="viewer-status" class="viewer-status">Loading document...</div><div id="viewer-content"></div></main>
    </div>
  </div>
  <script id="mdworks-restricted-viewer-box" type="application/json">__VIEWER_JSON__</script>
  <script>
(function(){
'use strict';
const BOX_ID='mdworks-restricted-viewer-box';
const FORMAT='mdworks-restricted-viewer';
const DISPLAY_TYPE='mdworks-restricted-viewer-display';
const MOBILE_QUERY='(max-width: 800px)';
const allowedElements=new Set(['SECTION','H1','H2','H3','P','IMG']);
const allowedAttrs=new Map([['SECTION',new Set(['class'])],['H1',new Set(['id','class'])],['H2',new Set(['id','class'])],['H3',new Set(['id','class'])],['P',new Set(['class'])],['IMG',new Set(['src','alt','loading','draggable'])]]);
const allowedSrc=['data:image/png;base64,','data:image/jpeg;base64,','data:image/webp;base64,'];
function fail(){const s=document.getElementById('viewer-status'); if(s){s.textContent='This Restricted Viewer could not be opened. The file may be damaged or unsupported.'; s.className='viewer-status viewer-error';} const c=document.getElementById('viewer-content'); if(c){c.replaceChildren();}}
function b64bytes(text){if(typeof text!=='string'||!/^[A-Za-z0-9+/]*={0,2}$/.test(text)){throw new Error('Invalid Base64');} const bin=atob(text); const out=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++){out[i]=bin.charCodeAt(i);} return out;}
function cleanNode(node, doc){if(node.nodeType===Node.TEXT_NODE){return doc.createTextNode(node.textContent||'');} if(node.nodeType!==Node.ELEMENT_NODE){return doc.createTextNode('');} if(!allowedElements.has(node.tagName)){const frag=doc.createDocumentFragment(); for(const child of node.childNodes){frag.appendChild(cleanNode(child,doc));} return frag;} const el=doc.createElement(node.tagName.toLowerCase()); const attrs=allowedAttrs.get(node.tagName)||new Set(); for(const attr of node.attributes){const name=attr.name.toLowerCase(); const value=attr.value; if(name.startsWith('on')||!attrs.has(name)){continue;} if(name==='src'&&!allowedSrc.some(prefix=>value.startsWith(prefix))){continue;} if((name==='src'||name==='href')&&/^\s*javascript:/i.test(value)){continue;} el.setAttribute(name,value);} for(const child of node.childNodes){el.appendChild(cleanNode(child,doc));} return el;}
function sanitizeDisplayHtml(html){const parser=new DOMParser(); const parsed=parser.parseFromString('<div>'+html+'</div>','text/html'); const frag=document.createDocumentFragment(); for(const child of parsed.body.firstChild.childNodes){frag.appendChild(cleanNode(child,document));} return frag;}
function setOutlineOpen(open){const app=document.getElementById('viewer-app'); const toggle=document.getElementById('outline-toggle'); if(app){app.classList.toggle('outline-collapsed',!open);} if(toggle){toggle.setAttribute('aria-expanded',String(open));}}
function ensureHeadingId(heading,index){if(heading.id){return heading.id;} let candidate='viewer-heading-'+(index+1); let n=1; while(document.getElementById(candidate)){candidate='viewer-heading-'+(index+1)+'-'+(n++);} heading.id=candidate; return candidate;}
function buildOutline(){const panel=document.getElementById('outline-panel'); const nav=document.getElementById('viewer-outline'); const content=document.getElementById('viewer-content'); if(!panel||!nav||!content){throw new Error('Viewer UI missing');} const headings=Array.from(content.querySelectorAll('h1,h2,h3')); nav.replaceChildren(); if(headings.length===0){panel.hidden=true;setOutlineOpen(false);return;} panel.hidden=false; headings.forEach((heading,index)=>{const id=ensureHeadingId(heading,index); const level=Number(heading.tagName.slice(1)); const item=document.createElement('button'); item.type='button'; item.className='outline-item outline-level-'+level; item.dataset.targetId=id; item.textContent=heading.textContent||'Untitled'; item.addEventListener('click',()=>scrollToHeading(id)); nav.appendChild(item);}); setOutlineOpen(!window.matchMedia(MOBILE_QUERY).matches); setupActiveHeading(headings);}
function scrollToHeading(id){const target=document.getElementById(id); if(!target){return;} const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches; target.scrollIntoView({behavior:reduceMotion?'auto':'smooth',block:'start'}); if(window.matchMedia(MOBILE_QUERY).matches){setOutlineOpen(false);}}
function setupActiveHeading(headings){if(!('IntersectionObserver' in window)){return;} const byId=new Map(Array.from(document.querySelectorAll('.outline-item')).map(b=>[b.dataset.targetId,b])); const observer=new IntersectionObserver(entries=>{for(const entry of entries){if(entry.isIntersecting){for(const b of byId.values()){b.classList.remove('is-active');} const active=byId.get(entry.target.id); if(active){active.classList.add('is-active');} break;}}},{rootMargin:'-20% 0px -70% 0px',threshold:0}); headings.forEach(h=>observer.observe(h));}
function installRestrictions(){const shell=document.getElementById('viewer-shell'); if(!shell){return;} for(const type of ['copy','cut','contextmenu','dragstart','selectstart']){shell.addEventListener(type,event=>event.preventDefault());} shell.addEventListener('keydown',event=>{const key=(event.key||'').toLowerCase(); if((event.ctrlKey||event.metaKey)&&['a','c','x','p','s'].includes(key)){event.preventDefault();}});}
async function run(){installRestrictions(); const toggle=document.getElementById('outline-toggle'); if(toggle){toggle.addEventListener('click',()=>setOutlineOpen(toggle.getAttribute('aria-expanded')!=='true'));} await new Promise(resolve=>requestAnimationFrame(resolve)); const boxEl=document.getElementById(BOX_ID); if(!boxEl){throw new Error('Viewer data not found');} const top=JSON.parse(boxEl.textContent||'{}'); if(top.format!==FORMAT||top.formatVersion!==1){throw new Error('Unsupported Restricted Viewer format');} const box=top.display||{}; for(const f of ['alg','keyFormat','key','iv','data']){if(!(f in box)){throw new Error('Invalid Display box');}} if(box.alg!=='AES-GCM'||box.keyFormat!=='raw-base64'){throw new Error('Unsupported Display box');} const keyBytes=b64bytes(box.key); const iv=b64bytes(box.iv); const data=b64bytes(box.data); if(keyBytes.length!==32||iv.length!==12||data.length<16){throw new Error('Invalid Display box lengths');} const key=await crypto.subtle.importKey('raw',keyBytes,{name:'AES-GCM'},false,['decrypt']); const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,data); const payload=JSON.parse(new TextDecoder('utf-8').decode(plain)); if(payload.v!==1||payload.type!==DISPLAY_TYPE||typeof payload.html!=='string'){throw new Error('Invalid Display payload');} document.title=typeof payload.title==='string'?payload.title:document.title; const title=document.getElementById('viewer-title'); if(title&&typeof payload.title==='string'){title.textContent=payload.title;} const main=document.getElementById('viewer-content'); main.replaceChildren(sanitizeDisplayHtml(payload.html)); buildOutline(); const status=document.getElementById('viewer-status'); if(status){status.remove();}}
run().catch(function(){fail();});
window.mdworksRestrictedViewerSanitizeForTest=sanitizeDisplayHtml;
window.mdworksRestrictedViewerBuildOutlineForTest=buildOutline;
window.mdworksRestrictedViewerSetOutlineOpenForTest=setOutlineOpen;
})();
  </script>
</body>
</html>
